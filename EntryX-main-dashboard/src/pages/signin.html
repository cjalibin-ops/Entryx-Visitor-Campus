<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EntryX | Sign In</title>

    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/signUp.css">
    <link rel="stylesheet" href="../styles/toascontainer.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="card">

            <!-- LOGO -->
            <div class="logo">
                <img src="../image/title.png" alt="EntryX Logo">
            </div>

            <!-- TITLE -->
            <h1>Welcome Back</h1>
            <p class="subtitle">Authorized access only: Admin and Guards</p>

            <!-- FORM -->
            <form id="signin-form">

                <!-- USERNAME -->
                <div class="form-group">
                    <label>User ID*</label>
                    <input type="text" id="username" placeholder="Ex: admin..." required>
                    <span class="error" id="usernameError">Username is required</span>
                </div>

                <!-- PASSWORD -->
                <div class="form-group">
                    <div class="label-row">
                        <label>Password*</label>
                        <a href="#">Forgot Password?</a>
                    </div>

                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" id="togglePassword">👁</button>
                    </div>

                    <span class="error" id="passwordError">Password must be at least 6 characters</span>
                </div>

                <!-- BUTTON -->
                <button type="submit" class="btn">
                    Sign In →
                </button>

            </form>

            <!-- FOOTER -->
            <div class="support">
                Access issue? <a href="#">Request Support</a>
            </div>

        </div>

        <div class="links">
            <a href="./policy.html">Privacy</a>
            <a href="./policy.html">Terms</a>
            <a href="./help.html">Help</a>
        </div>
    </div>
		    <!-- Toast container -->
			 <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

<!--<script src="../function/passwordVerification.js"></script>--> 
<script type="module" src="../handle-login-form/handle-security-login/handle-signUp.js"></script>
</body>
</html>
